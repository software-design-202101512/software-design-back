server:
  port: 8080

spring:
  application:
    name: edumanager

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/edumanager?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:ZWR1bWFuYWdlci1qd3Qtc2VjcmV0LWtleS1mb3ItaHMyNTYtZW5jb2Rpbmctc3RyaW5n}
  expiration: 86400000

logging:
  level:
    com.edumanager: DEBUG
    org.springframework.security: DEBUG
